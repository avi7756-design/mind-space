<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c1024">
<title>מרחב התת-מודע · לוח אימון מנטלי</title>
<!-- Share previews (WhatsApp / Email / Social) -->

<meta name="twitter:description" content="היפנוזה עצמית, מנטרות, חיפוש חכם ומעקב יעדים - מותאם לאייפון.">

<!-- PWA install (add to home screen) -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-title" content="התת-מודע">
<style>
  :root{
    --bg:#0a0e1f; --bg2:#0f1530; --card:rgba(255,255,255,.045);
    --card-br:rgba(255,255,255,.09); --ink:#eef1ff; --ink-dim:#a4abd0;
    --ink-faint:#6f78a4; --accent:#7c9cff; --accent2:#8be0d4;
    --gold:#ffce6b; --warn:#ff8a8a; --good:#7ee0a6;
    --bar:#2a335f; --bar-fill:linear-gradient(90deg,#7c9cff,#8be0d4);
    --r:18px; --shadow:0 12px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,"SF Pro Text","Segoe UI","Heebo","Assistant",system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #1a2350 0%, transparent 55%),
      radial-gradient(900px 500px at -10% 110%, #16322f 0%, transparent 50%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--ink); min-height:100vh;
    display:flex; justify-content:center;
    padding:env(safe-area-inset-top) 0 0;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    width:100%; max-width:460px; min-height:100vh;
    display:flex; flex-direction:column;
    padding:14px 14px calc(96px + env(safe-area-inset-bottom));
  }
  /* Header */
  header{display:flex;align-items:center;gap:10px;margin:4px 2px 14px}
  .logo{
    width:38px;height:38px;border-radius:12px;flex:0 0 auto;
    background:linear-gradient(135deg,#7c9cff,#8be0d4);
    display:grid;place-items:center;font-size:20px;
    box-shadow:0 6px 18px rgba(124,156,255,.4);
  }
  header h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px}
  header p{font-size:11px;margin:1px 0 0;color:var(--ink-faint)}
  .hdr-meta{margin-inline-start:auto;text-align:left}
  .hdr-meta .clock{font-size:13px;font-weight:600;color:var(--ink-dim)}
  .hdr-meta .greet{font-size:10px;color:var(--ink-faint)}

  .view{animation:rise .35s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .card{
    background:var(--card);border:1px solid var(--card-br);
    border-radius:var(--r);padding:16px;margin-bottom:12px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:var(--shadow);
  }
  .card h2{font-size:14px;margin:0 0 4px;display:flex;align-items:center;gap:7px}
  .card .sub{font-size:11px;color:var(--ink-faint);margin:0 0 12px}
  .tag{display:inline-block;font-size:10px;color:var(--accent2);background:rgba(139,224,212,.1);
       border:1px solid rgba(139,224,212,.25);padding:2px 8px;border-radius:20px}

  /* Main menu tiles */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tile{
    background:var(--card);border:1px solid var(--card-br);border-radius:16px;
    padding:14px;text-align:start;cursor:pointer;transition:.18s;position:relative;overflow:hidden;
  }
  .tile:active{transform:scale(.96);background:rgba(124,156,255,.12)}
  .tile .code{position:absolute;inset-inline-end:10px;top:10px;font-size:10px;font-weight:800;
              color:var(--accent);letter-spacing:1px;opacity:.8}
  .tile .ic{font-size:22px}
  .tile .nm{font-size:13px;font-weight:700;margin-top:7px}
  .tile .ds{font-size:10.5px;color:var(--ink-faint);margin-top:2px;line-height:1.45}

  /* Buttons / chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .chip{
    background:rgba(255,255,255,.05);border:1px solid var(--card-br);color:var(--ink);
    border-radius:12px;padding:9px 13px;font-size:13px;cursor:pointer;transition:.15s;font-family:inherit;
    flex:1 1 auto;text-align:center;min-width:42px;
  }
  .chip:active{transform:scale(.94)}
  .chip.sel{background:linear-gradient(135deg,#7c9cff,#8be0d4);color:#091029;border-color:transparent;font-weight:800}
  .chip.scale{flex:0 0 auto;width:42px;height:42px;display:grid;place-items:center;font-weight:700;border-radius:12px}

  .btn{
    display:block;width:100%;border:none;border-radius:14px;padding:13px;font-size:14px;font-weight:800;
    background:linear-gradient(135deg,#7c9cff,#8be0d4);color:#08102a;cursor:pointer;font-family:inherit;
    margin-top:6px;transition:.15s;
  }
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:rgba(255,255,255,.06);color:var(--ink);border:1px solid var(--card-br)}

  .q{margin-bottom:14px}
  .q .qt{font-size:13px;font-weight:600;margin-bottom:7px}
  .q .qt small{color:var(--ink-faint);font-weight:400;font-size:10.5px}

  /* Metric bars */
  .metric{display:flex;align-items:center;gap:10px;margin:9px 0}
  .metric .mi{font-size:17px;width:24px;text-align:center;flex:0 0 auto}
  .metric .ml{font-size:11.5px;color:var(--ink-dim);width:58px;flex:0 0 auto}
  .bartrack{flex:1;height:12px;background:var(--bar);border-radius:8px;overflow:hidden}
  .barfill{height:100%;border-radius:8px;background:var(--bar-fill);transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .metric .mv{font-size:12px;font-weight:800;width:30px;text-align:center;flex:0 0 auto}
  .ascii{font-family:"SF Mono","Menlo",monospace;letter-spacing:2px;font-size:15px;color:var(--accent2)}
  .stars{font-size:18px;letter-spacing:3px;text-align:center;margin:8px 0}

  .flag{background:rgba(255,138,138,.12);border:1px solid rgba(255,138,138,.35);color:var(--warn);
        border-radius:12px;padding:9px 12px;font-size:12px;font-weight:700;margin-top:8px;text-align:center}
  .note{background:rgba(255,206,107,.1);border:1px solid rgba(255,206,107,.3);color:var(--gold);
        border-radius:12px;padding:10px 12px;font-size:11.5px;margin-top:10px;line-height:1.5}

  /* tables / logs */
  table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
  th,td{padding:7px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06)}
  th{color:var(--ink-faint);font-weight:600;font-size:10px}
  td{color:var(--ink-dim)}
  tr:last-child td{border-bottom:none}

  .mantra{background:linear-gradient(135deg,rgba(124,156,255,.1),rgba(139,224,212,.07));
          border:1px solid var(--card-br);border-radius:14px;padding:14px;font-size:14px;line-height:1.7;
          margin-top:10px;font-weight:500}
  .mantra .lbl{font-size:10px;color:var(--accent2);font-weight:800;display:block;margin-bottom:4px;letter-spacing:.5px}

  .mlist .mi-row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;line-height:1.6}
  .mlist .mi-row:last-child{border-bottom:none}
  .mlist .htag{font-size:10px;color:var(--accent);margin-bottom:3px;font-weight:700}

  /* A4 player */
  .player{text-align:center;padding:8px 4px}
  .phase-name{font-size:12px;color:var(--accent2);font-weight:800;letter-spacing:1px;margin-bottom:4px}
  .phase-text{font-size:16px;line-height:1.75;min-height:120px;display:flex;align-items:center;justify-content:center;padding:10px}
  .ring{position:relative;width:120px;height:120px;margin:6px auto 14px}
  .ring svg{transform:rotate(-90deg)}
  .ring .rc-bg{stroke:var(--bar)}
  .ring .rc-fg{stroke:url(#grad);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
  .ring .rt{position:absolute;inset:0;display:grid;place-items:center;font-size:24px;font-weight:800}
  .breath{width:84px;height:84px;border-radius:50%;margin:0 auto 12px;
          background:radial-gradient(circle,rgba(139,224,212,.5),rgba(124,156,255,.15));
          animation:breathe 8s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(.6);opacity:.5}50%{transform:scale(1);opacity:1}}
  .steps{display:flex;justify-content:center;gap:6px;margin-top:10px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--bar)}
  .dot.on{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}

  .profilecard{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .pc-item{background:rgba(255,255,255,.04);border-radius:12px;padding:10px}
  .pc-item .k{font-size:10px;color:var(--ink-faint)}
  .pc-item .v{font-size:13px;font-weight:700;margin-top:3px}

  .trend{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13px}
  .trend .tu{font-size:18px;width:26px;text-align:center}
  .up{color:var(--good)} .down{color:var(--warn)} .flat{color:var(--ink-faint)}
  .histo{display:flex;align-items:flex-end;gap:6px;height:90px;margin:10px 0 4px;padding:0 4px}
  .hbar{flex:1;background:linear-gradient(180deg,#7c9cff,#3a4582);border-radius:5px 5px 0 0;
        position:relative;min-height:4px;transition:height .6s}
  .hbar span{position:absolute;bottom:-17px;left:0;right:0;text-align:center;font-size:9px;color:var(--ink-faint)}
  .hbar b{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:9px;color:var(--accent2)}

  .empty{text-align:center;color:var(--ink-faint);font-size:12px;padding:18px 8px;line-height:1.6}

  /* Footer command line */
  footer{
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    display:flex;justify-content:center;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,transparent,var(--bg) 38%);
  }
  .cmdbar{
    width:100%;max-width:460px;display:flex;gap:6px;align-items:center;
    background:rgba(16,20,42,.92);border:1px solid var(--card-br);border-radius:16px;
    padding:6px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--shadow);
  }
  .cmdbar .codes{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
  .cmdbar .codes::-webkit-scrollbar{display:none}
  .codebtn{flex:0 0 auto;background:rgba(255,255,255,.05);border:1px solid var(--card-br);color:var(--ink-dim);
           border-radius:10px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s}
  .codebtn:active{transform:scale(.92);background:var(--accent);color:#091029}
  .codebtn.home{background:linear-gradient(135deg,#7c9cff,#8be0d4);color:#091029}
  .cmdinput{width:54px;flex:0 0 auto;background:rgba(255,255,255,.06);border:1px solid var(--card-br);
            color:var(--ink);border-radius:10px;padding:8px;font-size:12px;text-align:center;font-family:inherit;text-transform:uppercase}
  .cmdinput::placeholder{color:var(--ink-faint);text-transform:none}
  .footer-codes-text{font-size:10px;color:var(--ink-faint);text-align:center;margin-top:6px}

  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:99;
    background:rgba(20,26,52,.97);border:1px solid var(--card-br);color:var(--ink);
    padding:10px 16px;border-radius:14px;font-size:12.5px;box-shadow:var(--shadow);
    opacity:0;transition:.3s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .link{color:var(--accent);text-decoration:none;font-weight:600}

  /* Nav bar (back / home / forward / search) */
  .navbar{display:flex;gap:7px;margin:0 -14px 12px;padding:8px 14px;align-items:center;overflow-x:auto;scrollbar-width:none;
    position:sticky;top:0;z-index:40;background:linear-gradient(180deg,var(--bg) 70%,transparent)}
  .navbar::-webkit-scrollbar{display:none}
  .navbtn{flex:0 0 auto;background:var(--card);border:1px solid var(--card-br);color:var(--ink-dim);
    border-radius:12px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
  .navbtn:active{transform:scale(.93)}
  .navbtn.dis{opacity:.32;pointer-events:none}
  .navbtn.home{background:rgba(124,156,255,.14);color:var(--accent);border-color:rgba(124,156,255,.3)}
  .navbtn.search{margin-inline-start:auto;background:linear-gradient(135deg,#7c9cff,#8be0d4);color:#091029;border-color:transparent}

  /* Search / smart index */
  .searchbox{display:flex;gap:7px;margin-top:6px}
  .searchbox input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--card-br);color:var(--ink);
    border-radius:12px;padding:12px;font-size:14px;font-family:inherit}
  .searchbox input::placeholder{color:var(--ink-faint)}
  .plan-step{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .plan-step:last-child{border-bottom:none}
  .plan-num{flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#7c9cff,#8be0d4);
    color:#091029;font-size:12px;font-weight:800;display:grid;place-items:center;margin-top:1px}
  .plan-step .pc{font-size:13px;line-height:1.5}
  .plan-step .pc small{display:block;color:var(--ink-faint);font-size:10.5px;margin-top:2px}
  .jumpbtn{background:rgba(124,156,255,.12);border:1px solid rgba(124,156,255,.3);color:var(--accent);
    border-radius:10px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;margin-inline-start:6px}
  .jumpbtn:active{transform:scale(.93)}

  /* Goals */
  .goal{background:rgba(255,255,255,.04);border:1px solid var(--card-br);border-radius:14px;padding:13px;margin-bottom:10px}
  .goal .gh{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
  .goal .gh .gx{margin-inline-start:auto;color:var(--ink-faint);font-size:16px;cursor:pointer;padding:0 4px}
  .goal .gmeta{font-size:10.5px;color:var(--ink-faint);margin:3px 0 8px}
  .gtrack{height:10px;background:var(--bar);border-radius:8px;overflow:hidden}
  .gfill{height:100%;border-radius:8px;background:var(--bar-fill);transition:width .7s cubic-bezier(.2,.8,.2,1)}
  .gpct{font-size:11px;font-weight:800;color:var(--accent2);margin-top:5px;display:flex;justify-content:space-between}
  .goal.done{border-color:rgba(126,224,166,.4);background:rgba(126,224,166,.07)}
  .streakcard{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(255,206,107,.12),rgba(255,138,138,.06));
    border:1px solid rgba(255,206,107,.25);border-radius:14px;padding:13px;margin-bottom:12px}
  .streakcard .sn{font-size:30px;font-weight:800;color:var(--gold);line-height:1}
  .streakcard .sl{font-size:11.5px;color:var(--ink-dim);line-height:1.5}

  /* Audio player */
  .vol{display:flex;align-items:center;gap:9px;margin-top:12px;font-size:12px;color:var(--ink-dim)}
  .vol input[type=range]{flex:1;accent-color:#8be0d4;height:4px}
  .playhint{font-size:11px;color:var(--accent2);margin-top:10px;text-align:center;line-height:1.5}
  .eq{display:inline-flex;gap:2px;align-items:flex-end;height:13px;margin-inline-start:7px;vertical-align:middle}
  .eq i{width:3px;background:var(--good);border-radius:2px;animation:eqp 1s ease-in-out infinite}
  .eq i:nth-child(2){animation-delay:.18s} .eq i:nth-child(3){animation-delay:.36s} .eq i:nth-child(4){animation-delay:.54s}
  @keyframes eqp{0%,100%{height:4px}50%{height:13px}}
  .nowbar{display:flex;align-items:center;gap:8px;background:rgba(126,224,166,.1);border:1px solid rgba(126,224,166,.3);
    border-radius:12px;padding:9px 12px;font-size:12.5px;color:var(--good);font-weight:700;margin-bottom:4px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🌀</div>
    <div>
      <h1>מרחב התת-מודע</h1>
      <p>לוח אימון מנטלי · v1.0</p>
    </div>
    <div class="hdr-meta">
      <div class="clock" id="clock">--:--</div>
      <div class="greet" id="greet"></div>
    </div>
  </header>
  <div class="navbar">
    <button class="navbtn" id="navback" onclick="back()" title="אחורה">‹</button>
    <button class="navbtn" id="navfwd" onclick="fwd()" title="קדימה">›</button>
    <button class="navbtn home" onclick="go('M0')" title="מסך ראשי">🏠 ראשי</button>
    <button class="navbtn" onclick="go('IX')" title="חיפוש חכם">🔍 חיפוש</button>
    <button class="navbtn share" onclick="shareApp()" title="שתף">📤 שתף</button>
  </div>
  <div id="view" class="view"></div>
</div>

<footer>
  <div>
    <div class="cmdbar">
      <button class="codebtn" onclick="back()" title="אחורה">‹</button>
      <button class="codebtn home" onclick="go('M0')" title="מסך ראשי">🏠</button>
      <div class="codes" id="codes"></div>
      <input class="cmdinput" id="cmd" placeholder="קוד" maxlength="3"
             onkeydown="if(event.key==='Enter')runCmd()" oninput="this.value=this.value.toUpperCase()">
    </div>
  </div>
</footer>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   PHASE 1 — CORE STATE & PERSISTENCE
============================================================ */
const LS_KEY = 'hypno_dashboard_v1';
const DEFAULT_STATE = {
  profile:{ target:'רוגע', time:'לפי צורך', duration:'5-7 דק', tone:'רגשי-מרגיע', gratitude:'תמיד', set:false },
  current:null,            // latest S1 metrics
  log:[],                  // appendable history
  audio:{ duration:'30 min', mode:'רוגע', lastQuery:'', vol:0.72 },
  goals:[]                 // tracked goals
};
let STATE = load();
function load(){ try{ return Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), JSON.parse(localStorage.getItem(LS_KEY))||{}); }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STATE)); } }
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(STATE)); }

/* ============================================================
   PHASE 2 — SEED DATA: A3 MANTRA LIBRARY
   מקור: "כוחו של התת מודע - מדיטציה והצהרות"
============================================================ */
const A3 = [
  { tags:['#בוקר','#אנרגיה'], items:[
    'אני בשיפור עצמי על בסיס יומיומי',
    'יש בי הכוח לשנות',
    'יש בי הכוח לצמוח ולגדול בקצב שמתאים לי',
    'הצלחה זורמת בתוכי והיא נובעת ממני באופן טבעי' ]},
  { tags:['#שפע','#עשייה'], items:[
    'תודה על הגדילה וההתפתחות שלי בכל יום יותר ויותר',
    'יש בי אמונה בעצמי',
    'יש בי הסכמה לקחת את המקום הטבעי שלי בחיים',
    'דיבור חיובי בתוך עצמי מבטיח את העצמאות שלי את החופש שלי מרחיב את האפשרויות שלי את ההגשמה שלי' ]},
  { tags:['#רוגע','#בריאות'], items:[
    'הגוף שלי בריא מבריא ומתאזן מרגע לרגע הגוף שלי מתחזק יחד איתי',
    'בגוף שלי ישנה חוכמה עמוקה וגבוהה, גוף שלי יודע לרפא ולחזק את עצמו',
    'יש בי את הידע איך להירגע',

/* ---- Hebrew text-to-speech: read any mantra aloud (eyes closed), male/female ---- */
let ttsGender='female', ttsReading=false;
function warmVoices(){ try{ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>{}; }catch(e){} }
function heVoices(){ try{ return speechSynthesis.getVoices().filter(v=>/he|iw/i.test(v.lang)); }catch(e){ return []; } }
function pickTtsVoice(){ const vs=heVoices(); if(!vs.length) return null;
  const male=vs.find(v=>/male|amir|david|דוד|אמיר/i.test(v.name));
  const female=vs.find(v=>/female|carmit|כרמית|shira/i.test(v.name));
  if(ttsGender==='male') return male||vs[0];
  return female||vs[0];
}
function ttsSet(g){ ttsGender=g; toast(g==='male'?'🎙️ קול גברי':'🎙️ קול נשי'); document.querySelectorAll('.ttsg').forEach(b=>b.classList.toggle('sel', b.dataset.g===g)); }
function speak(text){
  if(!('speechSynthesis' in window)){ toast('המכשיר לא תומך בהקראה'); return; }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='he-IL'; u.rate=0.84; u.pitch = ttsGender==='male'?0.55:1.45;   // wide gap so male/female differ even with one device voice
  const v=pickTtsVoice(); if(v) u.voice=v;
  u.onend=()=>{ ttsReading=false; }; ttsReading=true;
  speechSynthesis.speak(u);
}
function stopSpeak(){ try{ speechSynthesis.cancel(); }catch(e){} ttsReading=false; }

  </div>`;
}

/* ---- Personal voice recording per mantra (IndexedDB, offline) ---- */
let _recdb=null, recKeys=new Set(), mediaRec=null, recChunks=[], recCurId=null;
function recId(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return 'r'+h; }
function openRecDB(){ return new Promise(res=>{ try{ const r=indexedDB.open('hypnoRec',1);
  r.onupgradeneeded=()=>r.result.createObjectStore('rec'); r.onsuccess=()=>{_recdb=r.result;res(_recdb);}; r.onerror=()=>res(null);
  }catch(e){ res(null); } }); }
function loadRecKeys(){ return openRecDB().then(()=>{ if(!_recdb) return; try{ const rq=_recdb.transaction('rec','readonly').objectStore('rec').getAllKeys(); rq.onsuccess=()=>{ recKeys=new Set(rq.result); if(typeof CUR!=='undefined') go(CUR); }; }catch(e){} }); }
function putRec(id,blob){ return new Promise(res=>{ if(!_recdb)return res(); const tx=_recdb.transaction('rec','readwrite'); tx.objectStore('rec').put(blob,id); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }
function getRec(id){ return new Promise(res=>{ if(!_recdb)return res(null); const rq=_recdb.transaction('rec','readonly').objectStore('rec').get(id); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }
function recBoxInner(id){ const has=recKeys.has(id);
  return `<button class="jumpbtn" id="rbtn_${id}" onclick="toggleRec('${id}')">🎤 הקלט</button>`+
    (has?`<button class="jumpbtn" onclick="playRec('${id}')">🔵 הקול שלי</button><button class="jumpbtn" onclick="delRec('${id}')">🗑️</button>`:''); }
function recUI(text){ const id=recId(text); return `<span class="recbox" id="rb_${id}">${recBoxInner(id)}</span>`; }
function refreshRec(id){ const el=$('rb_'+id); if(el) el.innerHTML=recBoxInner(id); }
async function toggleRec(id){
  if(mediaRec && mediaRec.state==='recording'){ mediaRec.stop(); return; }
  if(!navigator.mediaDevices||!window.MediaRecorder){ toast('המכשיר לא תומך בהקלטה'); return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks=[]; recCurId=id; mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=e=>{ if(e.data&&e.data.size) recChunks.push(e.data); };
    mediaRec.onstop=async ()=>{ const blob=new Blob(recChunks,{type:(mediaRec&&mediaRec.mimeType)||'audio/mp4'});
      await putRec(recCurId,blob); recKeys.add(recCurId); stream.getTracks().forEach(t=>t.stop());
      refreshRec(recCurId); toast('🎙️ ההקלטה שלך נשמרה'); mediaRec=null; };
    mediaRec.start();

/* ---- In-app ambient sound engine (Web Audio, offline, 432Hz-tuned) ---- */
const SCENES={
  'רוגע':  { pads:[[216,.18],[324,.13],[432,.09]], filter:1200, lfo:.06, noise:{type:'white',gain:.022,filter:1300} },
  'שינה':  { pads:[[174,.18],[261,.14],[348,.09]], filter:900,  lfo:.05, noise:{type:'brown',gain:.16,filter:700} },
  'מיקוד': { pads:[[324,.14],[486,.09],[648,.06]], filter:1800, lfo:.03, noise:{type:'white',gain:.045,filter:2000} },
  'אנרגיה':{ pads:[[432,.14],[540,.11],[648,.08]], filter:2300, lfo:.16, noise:null },
};
let AC=null, scene=null, curMode=null, audioTimer=null;
function audioCtx(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function noiseBuf(type){ const len=AC.sampleRate*3, buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0); let last=0;
  for(let i=0;i<len;i++){ const w=Math.random()*2-1; if(type==='brown'){ last=(last+0.02*w)/1.02; d[i]=last*3.5; } else d[i]=w*0.55; } return buf; }
function stopScene(fade){
  if(!scene||!AC){ scene=null; curMode=null; return; }
  const s=scene; scene=null; curMode=null; const f=fade||0.5;
  try{ s.master.gain.cancelScheduledValues(AC.currentTime); s.master.gain.setTargetAtTime(0,AC.currentTime,f/3); }catch(e){}
  setTimeout(()=>{ s.sources.forEach(n=>{try{n.stop();}catch(e){}}); try{s.master.disconnect();}catch(e){} }, f*1000+250);
}
function startScene(mode,vol){
  const ac=audioCtx(); stopScene(0.2);
  const cfg=SCENES[mode]||SCENES['רוגע'], t=ac.currentTime;
  const master=ac.createGain(); master.gain.value=0; master.connect(ac.destination);
  const sources=[];
  cfg.pads.forEach(([f,g])=>{
    const o1=ac.createOscillator(); o1.type='sine'; o1.frequency.value=f;
    const o2=ac.createOscillator(); o2.type='sine'; o2.frequency.value=f; o2.detune.value=7;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=cfg.filter;
    const pg=ac.createGain(); pg.gain.value=g;
    o1.connect(lp); o2.connect(lp); lp.connect(pg); pg.connect(master);
    const lfo=ac.createOscillator(); lfo.frequency.value=cfg.lfo; const lg=ac.createGain(); lg.gain.value=g*0.5;
    lfo.connect(lg); lg.connect(pg.gain);
    o1.start(); o2.start(); lfo.start(); sources.push(o1,o2,lfo);
  });
  if(cfg.noise){ const src=ac.createBufferSource(); src.buffer=noiseBuf(cfg.noise.type); src.loop=true;
    const nf=ac.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=cfg.noise.filter;
    const ng=ac.createGain(); ng.gain.value=cfg.noise.gain;
    src.connect(nf); nf.connect(ng); ng.connect(master); src.start(); sources.push(src); }
  master.gain.setTargetAtTime(vol!=null?vol:0.6, t, 0.9);
  scene={master,sources}; curMode=mode;
}

ROUTES.A5=function(){
  const log=STATE.log;
  if(log.length<1){ view().innerHTML=`<div class="card"><h2>📊 אנליטיקה <span class="tag">A5</span></h2>
    <div class="empty">אין מספיק נתונים עדיין.<br>בצע/י כמה הערכות <b>S1</b> כדי לראות מגמות.</div>

  // last 7 days window
  const wk = log.slice(-7);
  const avg = k => wk.reduce((s,e)=>s+e[k],0)/wk.length;
  const trend = k => {
    if(wk.length<2) return 'flat';
    const half=Math.ceil(wk.length/2);
    const a=wk.slice(0,half).reduce((s,e)=>s+e[k],0)/half;
    const b=wk.slice(half).reduce((s,e)=>s+e[k],0)/(wk.length-half);
    return b-a>0.4?'up':b-a<-0.4?'down':'flat';
  };
  const tv = t => t==='up'?'<span class="up">↑</span>':t==='down'?'<span class="down">↓</span>':'<span class="flat">→</span>';

  // extremes
  let best=log[0], worst=log[0];
  log.forEach(e=>{ if(e.overall>best.overall)best=e; if(e.overall<worst.overall)worst=e; });

  // histogram = overall per last entries
  const hist=log.slice(-7);
  const histo=`<div class="histo">${hist.map(e=>{
    const h=pct(e.overall); const lbl=e.when.split(' ')[0];
    return `<div class="hbar" style="height:${Math.max(8,h)}%"><b>${e.overall}</b><span>${esc(lbl)}</span></div>`;
  }).join('')}</div>`;

  // optimization directive
  const directive = buildDirective(avg, wk);

  view().innerHTML=`

    <p class="sub">חלון 7 ימים · ${wk.length} רשומות אחרונות</p>

    <div class="trend"><span class="tu">🧠</span> מיקוד ${tv(trend('focus'))} <span style="color:var(--ink-faint);margin-inline-start:auto">ממוצע ${avg('focus').toFixed(1)}</span></div>
    <div class="trend"><span class="tu">🌿</span> רוגע ${tv(trend('calm'))} <span style="color:var(--ink-faint);margin-inline-start:auto">ממוצע ${avg('calm').toFixed(1)}</span></div>

    <div style="font-size:11px;color:var(--ink-faint);margin:14px 0 2px">היסטוגרמת מצב כללי</div>
    ${histo}

    <div style="display:flex;gap:10px;margin-top:24px">
      <div class="pc-item" style="flex:1"><div class="k">🟢 היום הכי טוב</div><div class="v" style="font-size:12px">${esc(best.when)}</div><div class="ascii" style="font-size:12px">${starStr(best.overall)}</div></div>
      <div class="pc-item" style="flex:1"><div class="k">🔴 יום מאתגר</div><div class="v" style="font-size:12px">${esc(worst.when)}</div><div class="ascii" style="font-size:12px">${starStr(worst.overall)}</div></div>
    </div>

    <div class="note">${directive}</div>
  </div>${FOOTER_TEXT}`;
};
function buildDirective(avg,wk){
  const e=avg('energy'),f=avg('focus'),c=avg('calm');
  const finCount=wk.filter(x=>x.finFlag).length;
  if(finCount>=2) return '💰 המלצה: זוהתה חרדה כספית חוזרת. שלב/י תרגול A4 ביעד "ביטחון" + מנטרת A2 לפני פתיחת מסחר.';
  const min=Math.min(e,f,c);
  if(min===e&&e<3) return '⚡ המלצה: הוסף/י S1 בשעה 09:00 ותרגול A4 קצר לאיזון מדד האנרגיה.';

}

const GOAL_TEMPLATES=[

  {type:'metric', metric:'energy', target:4, label:'ממוצע אנרגיה ⚡ ≥ 4', icon:'⚡'},
  {type:'metric', metric:'calm',   target:4, label:'ממוצע רוגע 🌿 ≥ 4',  icon:'🌿'},
  {type:'metric', metric:'focus',  target:4, label:'ממוצע מיקוד 🧠 ≥ 4', icon:'🧠'},
];
function calcStreak(){
  if(!STATE.log.length) return 0;
  const dayMs=86400000;
  const days=[...new Set(STATE.log.map(e=>new Date(e.ts).toDateString()))].map(d=>new Date(d).getTime()).sort((a,b)=>b-a);
  let today=new Date(); today.setHours(0,0,0,0); let expect=today.getTime();
  if(days[0]!==expect){ expect-=dayMs; if(days[0]!==expect) return 0; }   // allow streak ending yesterday
  let streak=0;
  for(const d of days){ if(d===expect){ streak++; expect-=dayMs; } else if(d<expect){ break; } }
  return streak;
}
function goalProgress(g){
  if(g.type==='streak'){ const s=calcStreak(); return {pct:Math.min(100,s/g.target*100), txt:s+' / '+g.target+' ימים'}; }
  if(g.type==='count'){ const n=STATE.log.filter(e=>e.ts>=g.createdTs).length; return {pct:Math.min(100,n/g.target*100), txt:n+' / '+g.target+' מפגשים'}; }
  if(g.type==='metric'){ const wk=STATE.log.slice(-7); const a=wk.length? wk.reduce((s,e)=>s+(e[g.metric]||0),0)/wk.length:0; return {pct:Math.min(100,a/g.target*100), txt:'ממוצע '+a.toFixed(1)+' / '+g.target}; }
  return {pct:0,txt:''};
}
function renderGoal(g){
  const p=goalProgress(g), done=p.pct>=100;
  return `<div class="goal${done?' done':''}">
    <div class="gh">${g.icon} ${esc(g.label)} ${done?'✅':''}<span class="gx" onclick="delGoal('${g.id}')">✕</span></div>
    <div class="gmeta">נוצר ${new Date(g.createdTs).toLocaleDateString('he-IL')}</div>
    <div class="gtrack"><div class="gfill" style="width:${p.pct}%"></div></div>
    <div class="gpct"><span>${p.txt}</span><span>${Math.round(p.pct)}%</span></div>
  </div>`;
}

function addGoal(i){ const t=GOAL_TEMPLATES[i]; STATE.goals.push(Object.assign({id:'g'+Date.now(),createdTs:Date.now()},t)); save(); toast('יעד נוסף ✓'); go('G1'); }
function delGoal(id){ if(confirm('להסיר את היעד?')){ STATE.goals=STATE.goals.filter(g=>g.id!==id); save(); go('G1'); } }

    {n:'הצהרה', s:50, breath:false, mantra:'עם כל נשיפה אני שוקע/ת עמוק יותר אל תוך שינה רגועה.', t:'הרגש/י את המילים:'},
    {n:'עיגון', s:40, breath:false, mantra:'אני בטוח/ה, רגוע/ה ומוגן/ת - שינה מתוקה ממתינה לי.', t:'ולסיום:'},
    {n:'הרדמות', s:30, breath:false, t:'תן/י למילים ולגוף לעשות את שלהם.\nלילה טוב, מחר תתעורר/י רענן/ה 🌙'} ]},
];
let slTimer=null, slI=0, slMedIdx=0, slVoice='hugo';
const NARRATION={
  hugo:'https://d8j0ntlcm91z4.cloudfront.net/user_3F0W79QTYmd2Dr5jPN0DEyDSFQB/hf_20260627_093014_654c141d-41d4-4e18-a5a7-8c9614c6ac5a.mp3',
  maya:'https://d8j0ntlcm91z4.cloudfront.net/user_3F0W79QTYmd2Dr5jPN0DEyDSFQB/hf_20260627_092900_9cfaf833-9b2a-499b-b2b6-d35e51dabcb8.mp3'
};
function slPickVoice(v){ slVoice=v; go('SL'); }
ROUTES.SL=function(){
  view().innerHTML=`
  <div class="card">
    <h2>🌙 מדיטציות שינה <span class="tag">SL</span></h2>
    <p class="sub">מודרך בעברית, ללא פרסומות.</p>

    <div class="nowbar" style="background:rgba(124,156,255,.1);border-color:rgba(124,156,255,.3);color:var(--accent)">🎧 מדיטציה בקול אמיתי (קריינות בעברית)</div>
    <div class="chips" style="margin-top:8px">
      <button class="chip${slVoice==='hugo'?' sel':''}" onclick="slPickVoice('hugo')">🎙️ קול גברי</button>
      <button class="chip${slVoice==='maya'?' sel':''}" onclick="slPickVoice('maya')">🎙️ קול נשי</button>
    </div>
    <audio id="slnarr" controls preload="none" style="width:100%;margin-top:10px" src="${NARRATION[slVoice]}"></audio>
    <div class="playhint">▶️ לחץ/י נגן · מתנגן גם במסך נעול · להוספת צליל רקע רך:
      <button class="jumpbtn" onclick="startScene('שינה',0.4);toast('🌊 צליל רקע פועל')">🌊 רקע</button></div>

    <div class="nowbar" style="background:rgba(255,206,107,.1);border-color:rgba(255,206,107,.3);color:var(--gold);margin-top:12px">🎤 המדיטציה בקול שלך</div>
    <div style="margin-top:8px">${recUI('SLEEP_PERSONAL_MEDITATION')}</div>
    <div class="playhint">הקלט/י מדיטציית שינה משלך - לשמוע את הקול שלך לפני השינה עוצמתי במיוחד.</div>

    <div style="font-size:11px;color:var(--ink-faint);margin:18px 0 8px">או מדיטציות טקסט מודרכות:</div>
    ${SLEEP_MEDS.map(m=>`<button class="tile" style="width:100%;margin-bottom:8px" onclick="slStart(${m.id})">
        <div class="ic">${m.icon}</div><div class="nm">${esc(m.name)}</div><div class="ds">${esc(m.desc)}</div></button>`).join('')}
    <div class="note">💡 מומלץ במיטה. הקריינות והטקסט מתקדמים לבד עד ההרדמות.</div>
  </div>${FOOTER_TEXT}`;
};
function slStart(idx){
  slMedIdx=idx; slI=0; const med=SLEEP_MEDS[idx];
  a1sel.mode='שינה'; startScene('שינה',0.55); armAudioTimer();   // ad-free ambient under the meditation
  view().innerHTML=`
  <div class="card">
    <div class="player">
      <div class="phase-name" id="slname"></div>
      <div class="ring"><svg width="120" height="120">
        <defs><linearGradient id="grads" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c9cff"/><stop offset="1" stop-color="#8be0d4"/></linearGradient></defs>
        <circle class="rc-bg" cx="60" cy="60" r="52" fill="none" stroke-width="7"/>
        <circle class="rc-fg" id="slring" cx="60" cy="60" r="52" fill="none" stroke-width="7" stroke="url(#grads)" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="0"/>
      </svg><div class="rt" id="sltime">0</div></div>
      <div id="slbreath"></div>
      <div class="phase-text" id="sltext"></div>
      <div class="steps" id="sldots">${med.phases.map((_,i)=>`<div class="dot" id="sld${i}"></div>`).join('')}</div>
      <div class="playhint">🎧 צליל הרקע ממשיך גם בסיום, כדי שתירדם/י ברוגע</div>
      <button class="btn ghost" style="margin-top:12px" onclick="slStop()">⏹️ עצור</button>
    </div>
  </div>${FOOTER_TEXT}`;
  slRunPhase();
}
function slRunPhase(){
  const ph=SLEEP_MEDS[slMedIdx].phases;
  if(slI>=ph.length){ slDone(); return; }
  const p=ph[slI], R=327; let left=p.s;
  $('slname').textContent='שלב '+(slI+1)+'/'+ph.length+' · '+p.n;
  $('sltext').innerHTML = p.mantra? `${esc(p.t)}<br><b style="color:var(--accent2)">«${esc(p.mantra)}»</b>` : esc(p.t).replace(/\n/g,'<br>');
  $('slbreath').innerHTML = p.breath?'<div class="breath"></div>':'';
  ph.forEach((_,i)=>$('sld'+i).classList.toggle('on',i<=slI));
  const upd=()=>{ $('sltime').textContent=left; $('slring').style.strokeDashoffset=R*(1-left/p.s); };
  upd(); clearInterval(slTimer);
  slTimer=setInterval(()=>{ left--; if(left<0){ slI++; slRunPhase(); } else upd(); },1000);
}
function slDone(){
  clearInterval(slTimer);
  view().innerHTML=`
  <div class="card">
    <h2>🌙 לילה טוב</h2>
    <p class="sub">צליל הרקע ממשיך לנגן ברכות</p>
    <div class="mantra" style="text-align:center">תן/י לעצמך לשקוע.<br>אין צורך לעשות דבר נוסף.</div>
    <button class="btn ghost" onclick="a1Stop();go('M0')">⏹️ עצור צליל וחזרה לתפריט</button>
  </div>${FOOTER_TEXT}`;
}
function slStop(){ clearInterval(slTimer); a1Stop(); toast('המדיטציה נעצרה'); go('M0'); }

/* ============================================================
   BOOT
============================================================ */
renderCodes('M0');
go('M0');
updateNav();
warmVoices();
loadRecKeys();
</script>
<script>if("serviceWorker" in navigator){addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}</script>
</body>
</html>
